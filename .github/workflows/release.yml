name: release-on-tag

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build Artifacts
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Multi-Platform Binaries
        shell: pwsh
        run: |
          ./scripts/build.ps1 -Version "${{ github.ref_name }}"

      - name: Prepare Release Folder
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "github.ref_name is empty"
          }

          $releaseDir = Join-Path "dist" ("release-" + $tag)
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null

          $outputs = @(
            "ops-tool-windows-amd64.exe",
            "ops-tool-windows-arm64.exe",
            "ops-tool-linux-amd64",
            "ops-tool-linux-arm64"
          )

          foreach ($name in $outputs) {
            $src = Join-Path "dist" $name
            if (-not (Test-Path $src)) {
              throw "missing build output: $src"
            }
            Copy-Item -Path $src -Destination (Join-Path $releaseDir $name) -Force
          }

      - name: Generate SHA256 Checksums
        shell: pwsh
        run: |
          $releaseDir = Join-Path "dist" ("release-" + "${{ github.ref_name }}")
          $checksumFile = Join-Path $releaseDir "SHA256SUMS.txt"
          if (Test-Path $checksumFile) {
            Remove-Item -Path $checksumFile -Force
          }

          Get-ChildItem -Path $releaseDir -File |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash  $($_.Name)" | Out-File -FilePath $checksumFile -Append -Encoding ascii
            }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ github.ref_name }}
          path: dist/release-${{ github.ref_name }}/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets-${{ github.ref_name }}
          path: dist/release-${{ github.ref_name }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ops-tool ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/release-${{ github.ref_name }}/*
